<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product | Yashni Creations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--green:#09261d;--gold:#c9a227;--gold-soft:#e6d59a;--cream:#f7f3ec;--ivory:#fffdf9;--ink:#17221d;--muted:#6f776f;--line:rgba(9,38,29,.14);--red:#b3123f;--shadow:0 20px 50px rgba(9,38,29,.12)}
*{box-sizing:border-box}
body{margin:0;background:var(--cream);color:var(--ink);font-family:"Jost",system-ui,sans-serif;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}button{font:inherit}img{display:block}
.zari{height:2px;background:linear-gradient(90deg,transparent,var(--gold-soft),var(--gold),var(--gold-soft),transparent)}
header{position:sticky;top:0;z-index:20;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:10px clamp(14px,4vw,64px);background:rgba(247,243,236,.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
.back{font-size:11px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--green)}
.back:hover{color:var(--gold)}
.logo-img{height:58px;width:auto;mix-blend-mode:multiply}
.logo-fallback{font-family:"Cormorant Garamond",serif;font-size:22px;font-weight:700;color:var(--green)}
.cart-wrap{display:flex;justify-content:flex-end}
.icon-btn{position:relative;display:grid;place-items:center;width:40px;height:40px;border:1px solid var(--line);border-radius:999px;background:var(--ivory);font-size:16px}
.badge{position:absolute;top:-6px;right:-7px;min-width:19px;height:19px;padding:0 5px;border-radius:999px;background:var(--red);color:#fff;display:grid;place-items:center;font-size:10px;font-weight:600}
.pdp{max-width:1240px;margin:clamp(24px,4vw,52px) auto clamp(50px,7vw,84px);padding:0 clamp(14px,3vw,24px);display:grid;grid-template-columns:minmax(0,1fr) minmax(330px,.9fr);gap:clamp(26px,4vw,60px);align-items:start}
.shot{background:var(--ivory);border:1px solid var(--line);border-radius:3px;overflow:hidden;box-shadow:var(--shadow)}
.shot img{width:100%;aspect-ratio:3/4;object-fit:cover}
.panel{background:var(--ivory);border:1px solid var(--line);border-radius:3px;padding:clamp(22px,3.4vw,40px)}
.kicker{margin:0 0 12px;color:var(--gold);font-size:10px;font-weight:600;letter-spacing:.28em;text-transform:uppercase}
h1{margin:0 0 20px;color:var(--green);font-family:"Cormorant Garamond",serif;font-weight:600;font-size:clamp(30px,4.6vw,50px);line-height:1.08}
.prices{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;padding-bottom:22px;margin-bottom:22px;border-bottom:1px solid var(--line)}
.now{font-family:"Cormorant Garamond",serif;font-size:34px;font-weight:700;color:var(--green)}
.was{font-size:15px;color:var(--muted);text-decoration:line-through}
.off{background:#fbe8ee;color:var(--red);padding:5px 10px;border-radius:2px;font-size:11px;font-weight:600}
.tax{width:100%;margin:0;color:var(--muted);font-size:12px;font-weight:300}
.desc{color:#4c5650;font-size:15px;font-weight:300;line-height:1.85;white-space:pre-wrap}
.label{display:block;margin:26px 0 10px;color:var(--green);font-size:10px;font-weight:600;letter-spacing:.2em;text-transform:uppercase}
.sizes{display:flex;gap:8px;flex-wrap:wrap}
.size{min-width:48px;min-height:42px;padding:0 12px;border:1px solid var(--line);background:transparent;border-radius:2px;color:var(--green);font-size:12px;font-weight:500;cursor:pointer;transition:.2s}
.size:hover{border-color:var(--gold)}
.size.on{background:var(--green);color:var(--gold-soft);border-color:var(--green)}
.qty{display:inline-flex;align-items:center;border:1px solid var(--line);border-radius:2px;background:#fff}
.qty button{width:42px;height:42px;border:0;background:transparent;color:var(--green);font-size:17px;cursor:pointer}
.qty span{min-width:44px;text-align:center;font-size:14px;font-weight:500}
.actions{display:flex;gap:10px;margin-top:28px}
.btn{flex:1;min-height:52px;border-radius:2px;font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;cursor:pointer;transition:.2s}
.btn-solid{border:1px solid var(--green);background:var(--green);color:#fff}
.btn-solid.in{background:var(--gold);border-color:var(--gold);color:var(--green)}
.btn-wa{border:1px solid #25d366;background:#25d366;color:#fff}
.btn:disabled{border-color:var(--line);background:#efece5;color:var(--muted);cursor:not-allowed}
.sold-note{margin:0 0 20px;background:#fbe8ee;color:var(--red);border-radius:2px;padding:12px 14px;font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;text-align:center}
.shot.sold img{filter:grayscale(1);opacity:.8}
.assure{margin:22px 0 0;padding-top:18px;border-top:1px solid var(--line);color:var(--muted);font-size:12px;font-weight:300;line-height:1.9}
.note{grid-column:1/-1;min-height:280px;display:grid;place-items:center;text-align:center;background:var(--ivory);border:1px dashed var(--line);border-radius:3px;padding:32px;color:var(--muted);font-weight:300;line-height:1.8}
.note a{color:var(--green);border-bottom:1px solid var(--gold)}
footer{background:var(--green);color:var(--cream);text-align:center;padding:44px 20px}
footer h2{margin:0;font-family:"Cormorant Garamond",serif;font-weight:600;color:var(--gold-soft);font-size:30px}
.credit{margin-top:20px;padding-top:18px;border-top:1px solid rgba(255,255,255,.12);color:rgba(247,243,236,.5);font-size:10px;letter-spacing:.18em;text-transform:uppercase}
.credit a{color:var(--gold-soft)}
@media (max-width:860px){header{padding:8px 12px}.logo-img{height:46px}.pdp{grid-template-columns:1fr}.actions{flex-direction:column}}
:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
</style>
</head>
<body>
<header>
  <a class="back" href="index.html">&#8592; Back to shop</a>
  <a href="index.html" aria-label="Yashni Creations home">
    <img src="Untitled.jpg" class="logo-img" alt="Yashni Creations" onerror="this.outerHTML='<span class=&quot;logo-fallback&quot;>Yashni Creations</span>'">
  </a>
  <div class="cart-wrap"><a href="cart.html" class="icon-btn" aria-label="Cart"><span aria-hidden="true">&#128717;</span><span class="badge" id="cartBadge">0</span></a></div>
</header>
<div class="zari"></div>

<main class="pdp" id="pdp"><div class="note">Loading this piece...</div></main>

<footer>
  <h2>Yashni Creations</h2>
  <div class="credit">Designed by <a href="https://skywebsolutions.in/" target="_blank" rel="noreferrer">SkyWeb Solutions</a> | <a href="admin.html">Admin portal &#128274;</a></div>
</footer>

<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const CART_KEY="yashni_cart";
const SIZES=["XS","S","M","L","XL","XXL","Free size"];
const box=document.getElementById("pdp");
let size="M",qty=1,P=null;

const esc=v=>String(v).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const inr=n=>"\u20B9"+Number(n||0).toLocaleString("en-IN");
const wasOf=p=>inr(Math.round(Number(p)/(1-CONFIG.DISCOUNT_PERCENT/100)));
const getCart=()=>{try{return JSON.parse(localStorage.getItem(CART_KEY))||[]}catch{return[]}};
const setCart=c=>{localStorage.setItem(CART_KEY,JSON.stringify(c));badge()};
const badge=()=>{document.getElementById("cartBadge").textContent=getCart().reduce((s,i)=>s+(i.quantity||1),0)};
badge();

const id=new URLSearchParams(location.search).get("id");

(async()=>{
  if(!id){box.innerHTML='<div class="note">No piece selected. <a href="index.html">Back to the collection</a>.</div>';return}
  if(!CONFIG.SUPABASE_URL.startsWith("http")){box.innerHTML='<div class="note">Setup is not finished. Add your Supabase URL and key in config.js.</div>';return}

  const db=supabase.createClient(CONFIG.SUPABASE_URL,CONFIG.SUPABASE_ANON_KEY);
  const {data,error}=await db.from("products").select("*").eq("id",id).single();
  if(error||!data){box.innerHTML='<div class="note">This piece is no longer available. <a href="index.html">See the full collection</a>.</div>';return}
  P=data;paint();
})();

function paint(){
  const img=P.image_url||"https://placehold.co/600x800/ece7dd/09261d?text=Yashni";
  const desc=P.description||"Premium ethnic wear, finished by hand. Message us on WhatsApp for fabric details, sizing and delivery time.";
  const inCart=getCart().some(i=>String(i.id)===String(P.id));
  document.title=P.title+" | Yashni Creations";

  const sold=P.in_stock===false;

  box.innerHTML=`
    <div class="shot ${sold?"sold":""}"><img src="${esc(img)}" alt="${esc(P.title)}"></div>
    <section class="panel">
      <p class="kicker">${esc(P.category||"Yashni Creations")} exclusive</p>
      <h1>${esc(P.title)}</h1>
      ${sold?'<p class="sold-note">Sold out &mdash; message us to check when it is back</p>':""}
      <div class="prices">
        <span class="now">${inr(P.price)}</span>
        <span class="was">${wasOf(P.price)}</span>
        <span class="off">${CONFIG.DISCOUNT_PERCENT}% off</span>
        <p class="tax">Inclusive of all taxes. Free shipping across India.</p>
      </div>
      <div class="desc">${esc(desc)}</div>
      <span class="label">Select size</span>
      <div class="sizes">${SIZES.map(s=>`<button class="size ${s===size?"on":""}" type="button" data-s="${s}">${s}</button>`).join("")}</div>
      <span class="label">Quantity</span>
      <div class="qty">
        <button type="button" id="minus" aria-label="Reduce quantity">&minus;</button>
        <span id="qv">1</span>
        <button type="button" id="plus" aria-label="Increase quantity">+</button>
      </div>
      <div class="actions">
        <button class="btn btn-solid ${inCart?"in":""}" type="button" id="add" ${sold?"disabled":""}>${sold?"Sold out":(inCart?"Go to cart":"Add to cart")}</button>
        <button class="btn btn-wa" type="button" id="wa">${sold?"Ask availability on WhatsApp":"Order on WhatsApp"}</button>
      </div>
      <p class="assure">Not sure about the size? Send us your measurements on WhatsApp and we will confirm the right fit before you pay.<br>Exchange available within 3 days of delivery.</p>
    </section>`;

  document.querySelectorAll(".size").forEach(b=>b.addEventListener("click",()=>{
    size=b.dataset.s;
    document.querySelectorAll(".size").forEach(x=>x.classList.toggle("on",x===b));
  }));
  document.getElementById("minus").onclick=()=>{qty=Math.max(1,qty-1);document.getElementById("qv").textContent=qty};
  document.getElementById("plus").onclick=()=>{qty=Math.min(10,qty+1);document.getElementById("qv").textContent=qty};

  if(!sold)document.getElementById("add").addEventListener("click",e=>{
    const b=e.currentTarget;
    if(b.classList.contains("in")){location.href="cart.html";return}
    const c=getCart();
    c.push({id:P.id,title:P.title,price:P.price,image:P.image_url,size,quantity:qty});
    setCart(c);
    b.textContent="Go to cart";b.classList.add("in");
  });

  document.getElementById("wa").addEventListener("click",()=>{
    const msg=sold
      ? `Hello Yashni Creations, is this piece available again?\n\n${P.title}\nPrice: ${inr(P.price)}\n\nLink: ${location.href}`
      : `Hello Yashni Creations, I want to order:\n\n${P.title}\nSize: ${size}\nQuantity: ${qty}\nPrice: ${inr(P.price)}\n\nLink: ${location.href}`;
    window.open(`https://wa.me/${CONFIG.WHATSAPP}?text=${encodeURIComponent(msg)}`,"_blank");
  });
}
</script>
</body>
</html>
