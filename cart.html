<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your bag | Yashni Creations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--green:#09261d;--gold:#c9a227;--gold-soft:#e6d59a;--cream:#f7f3ec;--ivory:#fffdf9;--ink:#17221d;--muted:#6f776f;--line:rgba(9,38,29,.14);--red:#b3123f;--shadow:0 20px 50px rgba(9,38,29,.10)}
*{box-sizing:border-box}
body{margin:0;background:var(--cream);color:var(--ink);font-family:"Jost",system-ui,sans-serif;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}button,input,textarea{font:inherit}img{display:block}
.zari{height:2px;background:linear-gradient(90deg,transparent,var(--gold-soft),var(--gold),var(--gold-soft),transparent)}
header{position:sticky;top:0;z-index:20;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:10px clamp(14px,4vw,64px);background:rgba(247,243,236,.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
.back{font-size:11px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--green)}
.back:hover{color:var(--gold)}
.logo-img{height:58px;width:auto;mix-blend-mode:multiply}
.logo-fallback{font-family:"Cormorant Garamond",serif;font-size:22px;font-weight:700;color:var(--green)}
.right{display:flex;justify-content:flex-end;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
.page{max-width:1180px;margin:clamp(26px,4vw,54px) auto clamp(50px,7vw,80px);padding:0 clamp(14px,3vw,24px)}
.title{margin:0 0 6px;font-family:"Cormorant Garamond",serif;font-weight:600;font-size:clamp(32px,5vw,52px);color:var(--green)}
.sub{margin:0 0 28px;color:var(--muted);font-weight:300;font-size:14px;line-height:1.7}
.layout{display:grid;grid-template-columns:minmax(0,1fr) minmax(300px,.62fr);gap:24px;align-items:start}
.items{background:var(--ivory);border:1px solid var(--line);border-radius:3px;padding:6px clamp(14px,2.4vw,24px)}
.row{display:grid;grid-template-columns:88px minmax(0,1fr) auto;gap:16px;align-items:center;padding:20px 0;border-bottom:1px solid var(--line)}
.row:last-child{border-bottom:0}
.row img{width:88px;aspect-ratio:3/4;object-fit:cover;border-radius:2px;background:#ece7dd}
.rname{margin:0 0 6px;font-size:15px;font-weight:400;line-height:1.45}
.meta{margin:0 0 12px;color:var(--muted);font-size:12px;font-weight:300}
.rprice{font-family:"Cormorant Garamond",serif;font-size:22px;font-weight:700;color:var(--green)}
.controls{display:flex;flex-direction:column;align-items:flex-end;gap:10px}
.qty{display:inline-flex;align-items:center;border:1px solid var(--line);border-radius:2px;background:#fff}
.qty button{width:36px;height:36px;border:0;background:transparent;color:var(--green);font-size:16px;cursor:pointer}
.qty span{min-width:36px;text-align:center;font-size:14px;font-weight:500}
.remove{border:0;background:transparent;color:var(--muted);font-size:11px;letter-spacing:.12em;text-transform:uppercase;cursor:pointer}
.remove:hover{color:var(--red)}
.summary{background:var(--green);color:var(--cream);border-radius:3px;padding:clamp(22px,3vw,30px);position:sticky;top:96px}
.summary h2{margin:0 0 20px;font-family:"Cormorant Garamond",serif;font-weight:600;font-size:26px;color:var(--gold-soft)}
.line{display:flex;justify-content:space-between;gap:12px;padding:9px 0;font-size:14px;font-weight:300;color:rgba(247,243,236,.85)}
.total{display:flex;justify-content:space-between;align-items:baseline;margin-top:14px;padding-top:16px;border-top:1px solid rgba(255,255,255,.18)}
.total span{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:rgba(247,243,236,.7)}
.total b{font-family:"Cormorant Garamond",serif;font-size:32px;font-weight:700;color:var(--gold-soft)}
.field{margin-top:16px}
.field label{display:block;margin-bottom:7px;font-size:10px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:rgba(247,243,236,.72)}
.field input,.field textarea{width:100%;border:1px solid rgba(255,255,255,.22);background:rgba(255,255,255,.06);color:#fff;border-radius:2px;padding:11px 12px;font-size:14px;font-weight:300;outline:0}
.field textarea{min-height:74px;resize:vertical;line-height:1.6}
.field input:focus,.field textarea:focus{border-color:var(--gold);background:rgba(255,255,255,.1)}
.field input::placeholder,.field textarea::placeholder{color:rgba(247,243,236,.4)}
.checkout{width:100%;min-height:52px;margin-top:22px;border:0;border-radius:2px;background:#25d366;color:#fff;font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;cursor:pointer}
.helper{margin:14px 0 0;color:rgba(247,243,236,.6);font-size:12px;font-weight:300;line-height:1.7}
.err{display:none;margin-top:12px;color:#ffc2d3;font-size:12px;line-height:1.6}
.empty{background:var(--ivory);border:1px dashed var(--line);border-radius:3px;padding:64px 24px;text-align:center}
.empty h2{margin:0 0 10px;font-family:"Cormorant Garamond",serif;font-weight:600;font-size:30px;color:var(--green)}
.empty p{margin:0 0 24px;color:var(--muted);font-weight:300}
.btn-gold{display:inline-flex;align-items:center;justify-content:center;min-height:48px;padding:0 26px;background:var(--gold);color:var(--green);border:0;border-radius:2px;font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;cursor:pointer}
footer{background:var(--green);color:var(--cream);text-align:center;padding:44px 20px}
footer h2{margin:0;font-family:"Cormorant Garamond",serif;font-weight:600;color:var(--gold-soft);font-size:30px}
.credit{margin-top:20px;padding-top:18px;border-top:1px solid rgba(255,255,255,.12);color:rgba(247,243,236,.5);font-size:10px;letter-spacing:.18em;text-transform:uppercase}
.credit a{color:var(--gold-soft)}
@media (max-width:900px){.layout{grid-template-columns:1fr}.summary{position:static}}
@media (max-width:560px){
  header{padding:8px 12px}.logo-img{height:46px}.right{display:none}
  .row{grid-template-columns:70px minmax(0,1fr);row-gap:12px}
  .row img{width:70px}
  .controls{grid-column:1/-1;flex-direction:row;justify-content:space-between;align-items:center}
}
:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
</style>
</head>
<body>
<header>
  <a class="back" href="index.html">&#8592; Continue shopping</a>
  <a href="index.html" aria-label="Yashni Creations home">
    <img src="Untitled.jpg" class="logo-img" alt="Yashni Creations" onerror="this.outerHTML='<span class=&quot;logo-fallback&quot;>Yashni Creations</span>'">
  </a>
  <div class="right" id="countTop"></div>
</header>
<div class="zari"></div>

<main class="page">
  <h1 class="title">Your bag</h1>
  <p class="sub">Review your pieces, then send the order to us on WhatsApp. We confirm stock, size and payment right away.</p>
  <div id="root"></div>
</main>

<footer>
  <h2>Yashni Creations</h2>
  <div class="credit">Designed by <a href="https://skywebsolutions.in/" target="_blank" rel="noreferrer">SkyWeb Solutions</a> | <a href="admin.html">Admin portal &#128274;</a></div>
</footer>

<script src="config.js"></script>
<script>
const CART_KEY="yashni_cart";
const root=document.getElementById("root");
const esc=v=>String(v).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const inr=n=>"\u20B9"+Number(n||0).toLocaleString("en-IN");
const price=v=>{const n=typeof v==="number"?v:parseInt(String(v).replace(/[^0-9]/g,""),10);return Number.isFinite(n)?n:0};
const getCart=()=>{try{return JSON.parse(localStorage.getItem(CART_KEY))||[]}catch{return[]}};
const saveCart=c=>localStorage.setItem(CART_KEY,JSON.stringify(c));

function render(){
  const cart=getCart();
  const units=cart.reduce((s,i)=>s+(i.quantity||1),0);
  document.getElementById("countTop").textContent=units?units+(units===1?" item":" items"):"";

  if(!cart.length){
    root.innerHTML=`<div class="empty">
      <h2>Your bag is empty</h2>
      <p>Browse the collection and add the pieces you love.</p>
      <a class="btn-gold" href="index.html">Shop the collection</a>
    </div>`;
    return;
  }

  const subtotal=cart.reduce((s,i)=>s+price(i.price)*(i.quantity||1),0);

  root.innerHTML=`<div class="layout">
    <section class="items">
      ${cart.map((i,idx)=>`
        <div class="row">
          <img src="${esc(i.image||"")}" alt="${esc(i.title||"")}">
          <div>
            <h3 class="rname">${esc(i.title||"Product")}</h3>
            <p class="meta">${i.size?"Size: "+esc(i.size)+" &nbsp;&#9670;&nbsp; ":""}${inr(price(i.price))} each</p>
            <span class="rprice">${inr(price(i.price)*(i.quantity||1))}</span>
          </div>
          <div class="controls">
            <div class="qty">
              <button type="button" data-act="dec" data-i="${idx}" aria-label="Reduce quantity">&minus;</button>
              <span>${i.quantity||1}</span>
              <button type="button" data-act="inc" data-i="${idx}" aria-label="Increase quantity">+</button>
            </div>
            <button class="remove" type="button" data-act="del" data-i="${idx}">Remove</button>
          </div>
        </div>`).join("")}
    </section>

    <aside class="summary">
      <h2>Order summary</h2>
      <div class="line"><span>Subtotal (${units} ${units===1?"item":"items"})</span><span>${inr(subtotal)}</span></div>
      <div class="line"><span>Shipping</span><span>Free</span></div>
      <div class="total"><span>Total</span><b>${inr(subtotal)}</b></div>
      <div class="field"><label for="cname">Your name</label><input id="cname" type="text" placeholder="Full name"></div>
      <div class="field"><label for="cphone">Phone number</label><input id="cphone" type="tel" inputmode="numeric" placeholder="10-digit mobile number"></div>
      <div class="field"><label for="caddr">Delivery address</label><textarea id="caddr" placeholder="House, street, city, pincode"></textarea></div>
      <button class="checkout" type="button" id="place">Send order on WhatsApp</button>
      <p class="err" id="err"></p>
      <p class="helper">Nothing is charged here. Your order opens in WhatsApp so we can confirm stock, size and payment with you directly.</p>
    </aside>
  </div>`;

  root.querySelectorAll("[data-act]").forEach(b=>b.addEventListener("click",()=>{
    const c=getCart(),i=Number(b.dataset.i);
    if(b.dataset.act==="inc")c[i].quantity=Math.min(10,(c[i].quantity||1)+1);
    if(b.dataset.act==="dec")c[i].quantity=Math.max(1,(c[i].quantity||1)-1);
    if(b.dataset.act==="del")c.splice(i,1);
    saveCart(c);render();
  }));

  document.getElementById("place").addEventListener("click",()=>{
    const name=document.getElementById("cname").value.trim();
    const phone=document.getElementById("cphone").value.replace(/\D/g,"");
    const addr=document.getElementById("caddr").value.trim();
    const err=document.getElementById("err");
    if(!name||phone.length<10||!addr){
      err.style.display="block";
      err.textContent="Add your name, a 10-digit phone number and delivery address so we can process the order.";
      return;
    }
    err.style.display="none";
    const lines=cart.map((i,n)=>`${n+1}. ${i.title}${i.size?" (Size "+i.size+")":""} x${i.quantity||1} - ${inr(price(i.price)*(i.quantity||1))}`).join("\n");
    const msg=`New order - Yashni Creations\n\n${lines}\n\nTotal: ${inr(subtotal)}\n\nName: ${name}\nPhone: ${phone}\nAddress: ${addr}`;
    window.open(`https://wa.me/${CONFIG.WHATSAPP}?text=${encodeURIComponent(msg)}`,"_blank");
  });
}
render();
</script>
</body>
</html>
