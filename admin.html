<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin portal | Yashni Creations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--green:#09261d;--gold:#c9a227;--gold-soft:#e6d59a;--cream:#f7f3ec;--ivory:#fffdf9;--ink:#17221d;--muted:#6f776f;--line:rgba(9,38,29,.14);--red:#b3123f;--ok:#0f7a4a;--shadow:0 20px 50px rgba(9,38,29,.10)}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;background:var(--cream);color:var(--ink);font-family:"Jost",system-ui,sans-serif;-webkit-font-smoothing:antialiased}
button,input,textarea,select{font:inherit}
h1,h2{font-family:"Cormorant Garamond",Georgia,serif;font-weight:600;margin:0}
#lock{position:fixed;inset:0;z-index:99;display:grid;place-items:center;padding:20px;background:radial-gradient(circle at 30% 20%,#12382c,#061a13)}
.lock-box{width:100%;max-width:420px;background:var(--ivory);border-radius:4px;box-shadow:var(--shadow);padding:36px}
.lock-box h1{color:var(--green);font-size:32px;text-align:center}
.zari{height:2px;margin:10px auto 20px;width:70px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.lock-box .hint{margin:0 0 22px;color:var(--muted);font-size:13px;font-weight:300;line-height:1.7;text-align:center}
#app{display:none;width:min(1180px,100% - 28px);margin:0 auto;padding:32px 0 60px}
.top{display:flex;align-items:center;justify-content:space-between;gap:18px;margin-bottom:26px;flex-wrap:wrap}
.top h1{color:var(--green);font-size:clamp(30px,4.6vw,46px)}
.top p{margin:6px 0 0;color:var(--muted);font-size:13px;font-weight:300}
.links{display:flex;gap:10px;flex-wrap:wrap}
.ghost{border:1px solid var(--line);background:var(--ivory);color:var(--green);border-radius:2px;padding:11px 16px;font-size:11px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center}
.ghost:hover{border-color:var(--gold)}
.ghost.danger:hover{border-color:var(--red);color:var(--red)}
.cols{display:grid;grid-template-columns:minmax(320px,.85fr) minmax(0,1fr);gap:22px;align-items:start}
.card{background:var(--ivory);border:1px solid var(--line);border-radius:4px;padding:clamp(20px,3vw,30px);box-shadow:0 10px 26px rgba(9,38,29,.05)}
.card>h2{color:var(--green);font-size:26px}
.card>.hint{margin:6px 0 22px;color:var(--muted);font-size:13px;font-weight:300;line-height:1.6}
.f{margin-bottom:16px}
label{display:block;margin-bottom:7px;color:var(--green);font-size:10px;font-weight:600;letter-spacing:.2em;text-transform:uppercase}
input,textarea,select{width:100%;border:1px solid var(--line);border-radius:2px;background:#fff;color:var(--ink);padding:12px;outline:0;font-weight:300}
textarea{min-height:110px;resize:vertical;line-height:1.7}
input:focus,textarea:focus,select:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,162,39,.15)}
.two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.rupee{position:relative}
.rupee input{padding-left:30px}
.rupee::before{content:"\20B9";position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px}
.drop{display:block;border:1px dashed var(--line);border-radius:3px;background:#fff;padding:18px;text-align:center;cursor:pointer;transition:.2s}
.drop:hover{border-color:var(--gold)}
.drop input{display:none}
.drop span{display:block;color:var(--muted);font-size:13px;font-weight:300}
.preview-grid{display:flex;gap:8px;justify-content:center;margin-bottom:10px;flex-wrap:wrap}
.preview-grid img{width:70px;aspect-ratio:3/4;object-fit:cover;border-radius:2px}
.solid{width:100%;min-height:48px;border:0;border-radius:2px;background:var(--green);color:#fff;font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;cursor:pointer;transition:.2s}
.solid:hover{background:var(--gold);color:var(--green)}
.solid:disabled{background:#cfcbc3;color:#6d6d6d;cursor:not-allowed}
.msg{display:none;margin-top:14px;text-align:center;font-size:13px;font-weight:500;line-height:1.6}
.msg.on{display:block}
.msg.ok{color:var(--ok)}
.msg.bad{color:var(--red)}
.search{display:flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:2px;background:#fff;padding:0 12px;margin-bottom:6px}
.search input{border:0;padding:11px 0}
.search input:focus{box-shadow:none}
.item{display:grid;grid-template-columns:64px minmax(0,1fr) auto;gap:14px;align-items:center;padding:14px 0;border-bottom:1px solid var(--line)}
.item:last-child{border-bottom:0}
.thumb{width:64px;aspect-ratio:3/4;object-fit:cover;border-radius:2px;background:#ece7dd}
.pname{display:block;color:var(--green);font-size:14px;font-weight:500;line-height:1.4}
.pmeta{display:block;margin-top:4px;color:var(--muted);font-size:12px;font-weight:300}
.tagcat{display:inline-block;margin-left:6px;background:#eef1ec;color:var(--green);padding:2px 7px;border-radius:2px;font-size:9px;letter-spacing:.1em;text-transform:uppercase}
.tagout{display:inline-block;margin-left:6px;background:#fbe8ee;color:var(--red);padding:2px 7px;border-radius:2px;font-size:9px;letter-spacing:.1em;text-transform:uppercase}
.tagoffer{display:inline-block;margin-left:6px;background:#fff8e6;color:var(--gold);padding:2px 7px;border-radius:2px;font-size:9px;letter-spacing:.1em;text-transform:uppercase;border:1px solid var(--gold-soft)}
.item.off .thumb{filter:grayscale(1);opacity:.55}
.mini.stock{color:var(--muted)}
.mini.stock.on{color:var(--green);border-color:rgba(9,38,29,.35)}
.acts{display:flex;gap:6px}
.mini{border:1px solid var(--line);background:#fff;border-radius:2px;padding:8px 11px;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;color:var(--green)}
.mini:hover{border-color:var(--gold)}
.mini.del{color:var(--red);border-color:rgba(179,18,63,.35)}
.mini.del:hover{background:var(--red);color:#fff;border-color:var(--red)}
.empty{padding:30px 0;text-align:center;color:var(--muted);font-size:13px;font-weight:300;line-height:1.8}
.sheet{position:fixed;inset:0;z-index:80;display:none;place-items:center;padding:20px;background:rgba(9,38,29,.72)}
.sheet.on{display:grid}
.sheet .card{width:100%;max-width:470px;max-height:90vh;overflow:auto}
.row{display:flex;gap:10px;margin-top:8px}
.row .solid{flex:1}
.setup{max-width:640px;margin:60px auto;padding:30px;background:#fff;border:1px solid var(--red);border-radius:4px;font-size:14px;line-height:1.8}
.setup code{background:#f3efe8;padding:2px 6px;border-radius:2px}
@media (max-width:880px){
  .cols{grid-template-columns:1fr}
  .item{grid-template-columns:54px minmax(0,1fr)}
  .thumb{width:54px}
  .acts{grid-column:2;justify-self:start}
}
:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
</style>
</head>
<body>
<div id="lock">
  <div class="lock-box">
    <h1>Yashni Creations</h1>
    <div class="zari"></div>
    <p class="hint">Log in with your email and password to manage your products.</p>
    <div class="f"><label for="email">Email</label><input type="email" id="email" autocomplete="username" placeholder="you@email.com"></div>
    <div class="f"><label for="pass">Password</label><input type="password" id="pass" autocomplete="current-password" placeholder="Password"></div>
    <button class="solid" type="button" id="loginBtn">Log in</button>
    <p class="msg" id="lockMsg"></p>
  </div>
</div>

<main id="app">
  <div class="top">
    <div>
      <h1>Product portal</h1>
      <p id="who">Add a piece, edit its price, or take it off the website.</p>
    </div>
    <div class="links">
      <a class="ghost" href="index.html" target="_blank" rel="noreferrer">View website</a>
      <button class="ghost danger" type="button" id="logout">Log out</button>
    </div>
  </div>

  <div class="cols">
    <section class="card">
      <h2>Add a product</h2>
      <p class="hint">It goes live on the website the moment you publish it.</p>
      
      <div class="f"><label for="title">Product name</label><input type="text" id="title" placeholder="Royal Emerald Lehenga"></div>
      
      <div class="two">
        <div class="f"><label for="price">Price</label><div class="rupee"><input type="number" id="price" inputmode="numeric" placeholder="4500" min="0"></div></div>
        <div class="f"><label for="offer">Offer Tag (optional)</label><input type="text" id="offer" placeholder="e.g. 10% OFF, Festive"></div>
      </div>
      
      <div class="two">
        <div class="f"><label for="cat">Category</label><select id="cat"></select></div>
        <div class="f"><label for="stock">Availability</label>
          <select id="stock">
            <option value="in">In stock</option>
            <option value="out">Out of stock</option>
          </select>
        </div>
      </div>
      
      <div class="f"><label for="desc">Description</label><textarea id="desc" placeholder="Fabric, work, fit and care details"></textarea></div>
