<script>
  // ==========================================
  // 🚀 FIREBASE SETUP (Aapka config yahan daalein)
  // ==========================================
  const firebaseConfig = {
      apiKey: "AIzaSyC-Ito4dNRQ45IjIOWL63Hqk9sKzbvKe-M",
      authDomain: "cureandcare-crm.firebaseapp.com",
      databaseURL: "https://cureandcare-crm-default-rtdb.firebaseio.com",
      projectId: "cureandcare-crm"
  };
  if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
  const database = firebase.database();

  // ==========================================
  // 🚀 1. LOGIN FUNCTIONALITY (ENTER KEY SUPPORT)
  // ==========================================
  function handleLoginSubmit(event) {
    if (event) event.preventDefault();
    const email = document.getElementById("email").value.trim();
    const pass = document.getElementById("pass").value.trim();
    const lockMsg = document.getElementById("lockMsg");

    if (!email || !pass) {
      showMsg(lockMsg, "Please fill all details.", true);
      return;
    }
    // Simple mock login for UI
    document.getElementById("lock").style.display = "none";
    document.getElementById("app").style.display = "block";
    loadProducts(); // Load products when logged in
  }

  function showMsg(el, text, isBad) {
    el.textContent = text;
    el.className = "msg on " + (isBad ? "bad" : "ok");
    setTimeout(() => { el.classList.remove("on"); }, 4000);
  }

  document.getElementById("logout").addEventListener("click", function() {
    document.getElementById("app").style.display = "none";
    document.getElementById("lock").style.display = "grid";
  });

  // ==========================================
  // 🚀 2. IMAGE UPLOAD & PREVIEW SYSTEM
  // ==========================================
  const fileInput = document.getElementById('file');
  const previewContainer = document.getElementById('previewContainer');
  const dropText = document.getElementById('dropText');
  let selectedImagesBase64 = []; 

  fileInput.addEventListener('change', function(e) {
    const files = Array.from(e.target.files).slice(0, 4); // Max 4 images
    previewContainer.innerHTML = '';
    selectedImagesBase64 = [];

    if(files.length > 0) {
        dropText.style.display = 'none';
    } else {
        dropText.style.display = 'block';
    }

    files.forEach((file, index) => {
      const reader = new FileReader();
      reader.onload = function(event) {
        const base64String = event.target.result;
        selectedImagesBase64.push(base64String);
        
        // Preview on screen
        const imgWrap = document.createElement('div');
        imgWrap.className = 'img-wrap';
        imgWrap.innerHTML = `
            <div class="img-num">${index + 1}</div>
            <img src="${base64String}" alt="Upload Preview">
        `;
        previewContainer.appendChild(imgWrap);
      };
      reader.readAsDataURL(file);
    });
  });

  // ==========================================
  // 🚀 3. PUBLISH NEW PRODUCT TO FIREBASE
  // ==========================================
  document.getElementById('publish').addEventListener('click', function() {
    const btn = this;
    const title = document.getElementById('title').value.trim();
    const price = document.getElementById('price').value.trim();
    const offer = document.getElementById('offer').value.trim();
    const cat = document.getElementById('cat').value;
    const stock = document.getElementById('stock').value;
    const desc = document.getElementById('desc').value.trim();
    
    // Get Checked Sizes
    const sizes = [];
    document.querySelectorAll('#sizes input[type="checkbox"]:checked').forEach(cb => {
        sizes.push(cb.value);
    });

    if(!title || !price || selectedImagesBase64.length === 0) {
        showMsg(document.getElementById('status'), "Please add Name, Price and at least 1 Photo.", true);
        return;
    }

    btn.textContent = "Publishing...";
    btn.disabled = true;

    const productData = {
        title: title,
        price: price,
        offer: offer,
        category: cat,
        stock: stock,
        sizes: sizes,
        description: desc,
        images: selectedImagesBase64,
        timestamp: Date.now()
    };

    database.ref('yashni_products').push(productData).then(() => {
        showMsg(document.getElementById('status'), "Piece Published to Collection! ✨", false);
        // Reset Form
        document.getElementById('title').value = '';
        document.getElementById('price').value = '';
        document.getElementById('offer').value = '';
        document.getElementById('desc').value = '';
        document.querySelectorAll('#sizes input').forEach(cb => cb.checked = false);
        selectedImagesBase64 = [];
        previewContainer.innerHTML = '';
        dropText.style.display = 'block';
    }).catch((err) => {
        showMsg(document.getElementById('status'), "Error publishing: " + err.message, true);
    }).finally(() => {
        btn.textContent = "Publish to Collection";
        btn.disabled = false;
    });
  });

  // ==========================================
  // 🚀 4. LOAD LIVE COLLECTION FROM FIREBASE
  // ==========================================
  let allProducts = {};

  function loadProducts() {
    database.ref('yashni_products').on('value', snap => {
        const list = document.getElementById('list');
        const liveCount = document.getElementById('liveCount');
        list.innerHTML = '';
        
        if (snap.exists()) {
            allProducts = snap.val();
            let count = 0;
            
            // Loop through products and reverse them (newest first)
            Object.keys(allProducts).reverse().forEach(key => {
                count++;
                let p = allProducts[key];
                let mainImage = p.images && p.images.length > 0 ? p.images[0] : '';
                
                let tagsHtml = `<span class="tagcat">${p.category}</span>`;
                if(p.offer) tagsHtml += `<span class="tagoffer">${p.offer}</span>`;
                if(p.stock === 'out') tagsHtml += `<span class="tagout">Out of Stock</span>`;

                list.innerHTML += `
                    <div class="item ${p.stock === 'out' ? 'off' : ''}">
                        <img src="${mainImage}" class="thumb" alt="${p.title}">
                        <div>
                            <span class="pname">${p.title} ${tagsHtml}</span>
                            <span class="pmeta">₹${p.price} • ${p.sizes ? p.sizes.join(', ') : 'Free Size'}</span>
                        </div>
                        <div class="acts">
                            <button class="mini" onclick="openEditSheet('${key}')">Edit Price/Info</button>
                            <button class="mini del" onclick="deleteProduct('${key}')">Remove</button>
                        </div>
                    </div>
                `;
            });
            liveCount.textContent = `${count} pieces currently visible to clients.`;
        } else {
            list.innerHTML = '<p class="empty">No pieces added yet. Start by publishing above.</p>';
            liveCount.textContent = `0 pieces currently visible.`;
        }
    });
  }

  // ==========================================
  // 🚀 5. EDIT PRODUCT SYSTEM (CHANGING PRICE)
  // ==========================================
  let currentEditId = null;

  function openEditSheet(id) {
    currentEditId = id;
    const p = allProducts[id];
    
    // Populate Data into Modal
    document.getElementById('eTitle').value = p.title || '';
    document.getElementById('ePrice').value = p.price || '';
    document.getElementById('eOffer').value = p.offer || '';
    document.getElementById('eCat').value = p.category || 'lehenga';
    document.getElementById('eStock').value = p.stock || 'in';
    
    document.getElementById('sheet').classList.add('on');
  }

  function closeSheet() {
    document.getElementById('sheet').classList.remove('on');
    currentEditId = null;
  }

  function saveEditChanges() {
    if(!currentEditId) return;
    
    const newTitle = document.getElementById('eTitle').value.trim();
    const newPrice = document.getElementById('ePrice').value.trim();
    
    if(!newTitle || !newPrice) {
        alert("Name and Price cannot be empty!");
        return;
    }

    const updates = {
        title: newTitle,
        price: newPrice,
        offer: document.getElementById('eOffer').value.trim(),
        category: document.getElementById('eCat').value,
        stock: document.getElementById('eStock').value
    };

    database.ref('yashni_products/' + currentEditId).update(updates).then(() => {
        closeSheet();
    });
  }

  function deleteProduct(id) {
      if(confirm("Are you sure you want to permanently delete this piece from the website?")) {
          database.ref('yashni_products/' + id).remove();
      }
  }

</script>
